<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">

	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description"
			content="Momenta - A reactive UI framework for Rust with fine-grained reactivity and a familiar JSX-like syntax" />
		<meta name="keywords" content="Rust, UI, Framework, Reactive, JSX, Web Development, Momenta" />
		<meta name="author" content="Momenta Team" />
		<meta name="theme-color" content="#0f1117" />
		<title>Momenta - The Reactive Rust UI Framework</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
			rel="stylesheet" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
		<link rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark-dimmed.min.css" />
		<link data-trunk rel="rust" />
		<link data-trunk rel="tailwind-css" href="./globals.css" />
		<link data-trunk rel="copy-dir" href="./static/" />
		<style>
			html {
				font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
			}

			code,
			pre,
			.font-mono,
			kbd {
				font-family: 'Fira Code', ui-monospace, SFMono-Regular, monospace;
				font-feature-settings: "liga" 1;
			}

			#loading {
				position: fixed;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #0f1117;
				z-index: 9999;
				transition: opacity 0.4s ease;
			}

			.loaded {
				opacity: 0;
				pointer-events: none;
			}

			.ld-ring {
				width: 28px;
				height: 28px;
				border: 2.5px solid rgba(255, 255, 255, 0.08);
				border-top-color: #528bff;
				border-radius: 50%;
				animation: spin 0.7s linear infinite;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

		</style>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/rust.min.js"></script>
		<script>
			if ( localStorage.theme === 'light' ) {
				document.documentElement.classList.remove( 'dark' );
			}
			window.addEventListener( 'load', function () {
				setTimeout( function () {
					document.getElementById( 'loading' )?.classList.add( 'loaded' );
				}, 400 );
			} );
		</script>
	</head>

	<body id="app" class="min-h-screen bg-background text-foreground antialiased">
		<div id="loading"><span class="ld-ring"></span></div>
	</body>

</html>
